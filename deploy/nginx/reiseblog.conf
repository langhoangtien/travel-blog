# ============================================
# Nginx Production Config - Reiseblog
# ============================================
# Vị trí: /etc/nginx/sites-available/nerovia
# Symlink: ln -s /etc/nginx/sites-available/nerovia /etc/nginx/sites-enabled/
# ============================================

# --- Rate Limiting ---
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=3r/m;

# --- Redirect HTTP -> HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name nerovia.de www.nerovia.de;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect tất cả HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Redirect www -> non-www (HTTPS) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.nerovia.de;

    ssl_certificate /etc/letsencrypt/live/nerovia.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nerovia.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://nerovia.de$request_uri;
}

# --- Main HTTPS Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nerovia.de;

    # --- SSL ---
    ssl_certificate /etc/letsencrypt/live/nerovia.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nerovia.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security Headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # --- Client Settings ---
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # --- Proxy Settings ---
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;

    # --- Static Assets Cache (Next.js _next/static) ---
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Public static files ---
    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /favicon {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- API Rate Limiting ---
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    location /api/contact {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    location /api/newsletter {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    # --- Admin Panel ---
    location /admin {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    # --- Main App ---
    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    # --- Block dotfiles ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- Logging ---
    access_log /var/log/nginx/nerovia-access.log;
    error_log /var/log/nginx/nerovia-error.log warn;
}
